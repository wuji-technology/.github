name: Centralized Release (Batch Update CHANGELOG)

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: '仓库和版本配置 (每行一个，格式: repo=version)'
        required: true
        type: string
        default: |
          # 示例:
          # wujihandpy=1.5.0
          # wujihandros2=2.0.0
      release_date:
        description: '发布日期 (YYYY-MM-DD，留空则使用当天)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run (仅测试，不创建 PR)'
        required: false
        type: boolean
        default: false

jobs:
  parse-input:
    name: Parse Repository Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Checkout .github repository
        uses: actions/checkout@v4

      - name: Parse repositories input
        id: parse
        run: |
          echo "解析仓库配置..."
          cat <<'EOF' | python3 scripts/parse-repos.py > repos.json
          ${{ inputs.repositories }}
          EOF

          # 读取并输出
          matrix=$(cat repos.json | jq -c '{include: .}')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

          echo "✅ 解析成功，将处理以下仓库:"
          cat repos.json | jq -r '.[] | "  - \(.repo) v\(.version)"'

  update-changelog:
    name: Update CHANGELOG - ${{ matrix.repo }} v${{ matrix.version }}
    needs: parse-input
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-input.outputs.matrix) }}

    steps:
      - name: Checkout .github repository
        uses: actions/checkout@v4
        with:
          path: .github-repo

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.repo }}

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: wuji-technology/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo

      - name: Validate CHANGELOG exists
        working-directory: target-repo
        run: |
          if [ ! -f "${{ matrix.changelog_path }}" ]; then
            echo "❌ 错误: ${{ matrix.changelog_path }} 不存在"
            exit 1
          fi
          echo "✅ ${{ matrix.changelog_path }} 存在"

      - name: Update CHANGELOG.md
        working-directory: target-repo
        env:
          RELEASE_DATE: ${{ inputs.release_date }}
          CHANGELOG_PATH: ${{ matrix.changelog_path }}
        run: |
          date_arg=""
          if [ -n "$RELEASE_DATE" ]; then
            date_arg="--date $RELEASE_DATE"
            echo "📅 使用指定发布日期: $RELEASE_DATE"
          else
            echo "📅 使用当天日期"
          fi

          python3 ../.github-repo/scripts/update-changelog.py \
            --file "$CHANGELOG_PATH" \
            --version ${{ matrix.version }} \
            $date_arg

      - name: Update public CHANGELOG.md
        if: ${{ matrix.public_changelog_path != '' }}
        working-directory: target-repo
        env:
          RELEASE_DATE: ${{ inputs.release_date }}
          PUBLIC_CHANGELOG_PATH: ${{ matrix.public_changelog_path }}
        run: |
          if [ ! -f "$PUBLIC_CHANGELOG_PATH" ]; then
            echo "❌ 错误: $PUBLIC_CHANGELOG_PATH 不存在"
            exit 1
          fi

          date_arg=""
          if [ -n "$RELEASE_DATE" ]; then
            date_arg="--date $RELEASE_DATE"
          fi

          python3 ../.github-repo/scripts/update-changelog.py \
            --file "$PUBLIC_CHANGELOG_PATH" \
            --version ${{ matrix.version }} \
            $date_arg

      - name: Update version files
        if: ${{ !inputs.dry_run }}
        working-directory: target-repo
        env:
          VERSION: ${{ matrix.version }}
        run: |
          if [ -f ".release.yml" ]; then
            echo "📦 发现 .release.yml，更新版本号文件..."
            pip install pyyaml -q
            python3 ../.github-repo/scripts/update-versions.py \
              --config .release.yml \
              --version "$VERSION"
          else
            echo "ℹ️ 未发现 .release.yml，跳过版本号更新"
          fi

      - name: Create release branch
        if: ${{ !inputs.dry_run }}
        working-directory: target-repo
        env:
          VERSION: ${{ matrix.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branch_name="release/v${VERSION}"
          git checkout -b "$branch_name"
          git add "${{ matrix.changelog_path }}"
          if [ -n "${{ matrix.public_changelog_path }}" ]; then
            git add "${{ matrix.public_changelog_path }}"
          fi
          if [ -f ".release.yml" ]; then
            python3 -c "
          import yaml
          with open('.release.yml') as f:
              config = yaml.safe_load(f)
          for entry in config.get('version_files', []):
              print(entry['path'])
          " | while read -r vfile; do
              [ -f "$vfile" ] && git add "$vfile" && echo "  📦 Staged: $vfile"
            done
          fi
          git commit -m "release: v${VERSION}

          Update CHANGELOG.md and version files for v${VERSION} release"

          git push origin "$branch_name"
          echo "✅ 已推送分支: $branch_name"

      - name: Create Pull Request
        if: ${{ !inputs.dry_run }}
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ matrix.version }}
          RELEASE_DATE: ${{ inputs.release_date }}
        run: |
          # 确保 auto-release label 存在
          gh label create "auto-release" --description "Trigger auto-release on PR merge" --color "0E8A16" 2>/dev/null || true

          # 显示发布日期信息
          date_info=""
          if [ -n "$RELEASE_DATE" ]; then
            date_info="- **计划发布日期**: ${RELEASE_DATE}"
          fi

          # 生成版本文件列表
          version_files_info=""
          if [ -f ".release.yml" ]; then
            vfiles=$(python3 -c "
          import yaml
          with open('.release.yml') as f:
              config = yaml.safe_load(f)
          paths = [e['path'] for e in config.get('version_files', [])]
          print(', '.join(f'\`{p}\`' for p in paths))
          ")
            version_files_info=$'\n- 更新版本号文件: '"${vfiles}"
          fi

          pr_body="## Release v${VERSION}

          此 PR 由集中式 Release 自动化流程创建。

          ### 变更内容
          - 更新 CHANGELOG.md，将 Unreleased 替换为 v${VERSION}${version_files_info}
          ${date_info}

          ### 后续步骤
          1. ✅ 审核 CHANGELOG 内容
          2. ✅ 在发布日期合并此 PR
          3. 🤖 自动触发: 打 tag、创建 release、发送飞书通知

          ---

          🤖 Created by [Centralized Release Automation](https://github.com/wuji-technology/.github)"

          pr_url=$(gh pr create \
            --title "release: v${VERSION}" \
            --body "$pr_body" \
            --label "auto-release" \
            --base main \
            --head "release/v${VERSION}")

          echo "✅ PR 创建成功: $pr_url"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: target-repo
        env:
          VERSION: ${{ matrix.version }}
        run: |
          echo "🔍 Dry run 模式，不创建 PR"
          echo "✅ CHANGELOG 更新成功"
          if [ -f ".release.yml" ]; then
            echo ""
            echo "📦 版本号文件更新预览:"
            pip install pyyaml -q 2>/dev/null
            python3 ../.github-repo/scripts/update-versions.py \
              --config .release.yml \
              --version "$VERSION" \
              --dry-run
          fi
          echo ""
          echo "如需实际创建 PR，请取消勾选 dry_run 选项"

  notify-feishu:
    name: Notify Feishu
    needs: [parse-input, update-changelog]
    if: always() && needs.parse-input.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu notification
        env:
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPOS_INPUT: ${{ inputs.repositories }}
          RELEASE_DATE: ${{ inputs.release_date }}
          DRY_RUN: ${{ inputs.dry_run }}
          JOB_STATUS: ${{ needs.update-changelog.result }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # 设置状态
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="成功"
            CARD_COLOR="green"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="失败"
            CARD_COLOR="red"
          fi

          # dry run 标记
          DRY_RUN_TAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_RUN_TAG=" 🧪 DRY RUN"
          fi

          # 发布日期
          if [ -n "$RELEASE_DATE" ]; then
            DISPLAY_DATE="$RELEASE_DATE"
          else
            DISPLAY_DATE="$(date +%Y-%m-%d)"
          fi

          # 解析仓库列表并生成带链接的 markdown
          REPO_LINES=""
          while IFS= read -r line; do
            # 跳过空行和注释
            line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [[ -z "$line" || "$line" == \#* ]] && continue

            # 处理可能的 :changelog_path 后缀
            REPO_VERSION=$(echo "$line" | cut -d':' -f1)
            REPO=$(echo "$REPO_VERSION" | cut -d'=' -f1)
            VERSION=$(echo "$REPO_VERSION" | cut -d'=' -f2)

            if [ -n "$REPO_LINES" ]; then
              REPO_LINES="${REPO_LINES}"$'\n'
            fi
            REPO_LINES="${REPO_LINES}• [${REPO}](https://github.com/wuji-technology/${REPO}/pulls) → v${VERSION}"
          done <<< "$REPOS_INPUT"

          # 使用 jq 构建 JSON（自动处理转义）
          TITLE="${STATUS_EMOJI} Release 自动化${STATUS_TEXT}${DRY_RUN_TAG}"
          INFO_CONTENT="**发布日期**: ${DISPLAY_DATE}"$'\n'"**触发者**: ${ACTOR}"
          REPO_CONTENT="**涉及仓库**:"$'\n'"${REPO_LINES}"

          JSON_PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg color "$CARD_COLOR" \
            --arg info "$INFO_CONTENT" \
            --arg repos "$REPO_CONTENT" \
            --arg url "$RUN_URL" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: { content: $title, tag: "plain_text" },
                  template: $color
                },
                elements: [
                  { tag: "div", text: { tag: "lark_md", content: $info } },
                  { tag: "hr" },
                  { tag: "div", text: { tag: "lark_md", content: $repos } },
                  { tag: "action", actions: [{ tag: "button", text: { tag: "plain_text", content: "查看运行详情" }, type: "primary", url: $url }] },
                  { tag: "note", elements: [{ tag: "plain_text", content: "🤖 Centralized Release Automation" }] }
                ]
              }
            }')

          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"
